name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Install mk8900image dependencies
        run: |
          sudo apt-get install -y libpng-dev libssl-dev zlib1g-dev

      - name: Build all release targets
        run: |
          RELEASE_TARGETS="iPhone2G iPhone3G iPodTouch1G iPodTouch2G iPhone3GS iPhone4 iPad1G iPodTouch4G aTV2G"
          for target in $RELEASE_TARGETS; do
            echo "::group::Building $target"
            make "$target"
            echo "::endgroup::"
          done

      - name: Build installer targets
        run: |
          INSTALLER_TARGETS="iPhone2G-Installer iPhone3G-Installer iPodTouch1G-Installer"
          for target in $INSTALLER_TARGETS; do
            echo "::group::Building $target"
            make "$target"
            echo "::endgroup::"
          done

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp *.img3 *.bin dist/ 2>/dev/null || true
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openiboot-images
          path: dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
